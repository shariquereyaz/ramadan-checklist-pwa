<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ramadan Checklist</title>

  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />

  <meta name="theme-color" content="#f3e9e3" />
</head>
<body>

  <h1>Ramadan Checklist</h1>

  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>Day</th>
          <th>Fast</th>
          <th>Tahajjud</th>
          <th>Fajr</th>
          <th>Dhuhr</th>
          <th>Asr</th>
          <th>Maghrib</th>
          <th>Isha</th>
          <th>Dhuha</th>
          <th>Dhikr</th>
          <th>Taraweeh</th>
          <th>Sadaqa</th>
          <th>Quran</th>
        </tr>
      </thead>
      <tbody id="checklist-body"></tbody>
    </table>
  </div>

  <script src="app.js"></script>
</body>
</html>
